<svg width="600" height="340" viewBox="0 0 600 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Left column: three service icons -->
  <!-- Cloud/Server icon -->
  <rect x="40" y="50" width="80" height="80" rx="20" fill="#232326"/>
  <g transform="translate(60, 68)">
    <rect x="4" y="20" width="32" height="8" rx="2" fill="#555"/>
    <rect x="4" y="12" width="32" height="8" rx="2" fill="#555"/>
    <circle cx="30" cy="16" r="2" fill="#777"/>
    <circle cx="30" cy="24" r="2" fill="#777"/>
    <path d="M12 12C12 7 16 3 21 3C25 3 28 5.5 29 9C33 9.5 36 12.5 36 16H8C8 13 9.8 12.2 12 12Z" fill="#666"/>
  </g>

  <!-- Folder icon -->
  <rect x="40" y="155" width="80" height="80" rx="20" fill="#232326"/>
  <g transform="translate(60, 175)">
    <path d="M6 12H34V34H6V12Z" rx="2" fill="#555"/>
    <path d="M6 12L10 6H20L24 12" fill="#555"/>
    <rect x="6" y="12" width="28" height="22" rx="2" fill="#555"/>
  </g>

  <!-- Lock/Security icon -->
  <rect x="40" y="260" width="80" height="80" rx="20" fill="#232326"/>
  <g transform="translate(60, 278)">
    <rect x="8" y="18" width="24" height="20" rx="3" fill="#555"/>
    <path d="M12 18V12C12 7.6 15.6 4 20 4C24.4 4 28 7.6 28 12V18" stroke="#555" stroke-width="3" fill="none"/>
    <circle cx="20" cy="28" r="3" fill="#333"/>
  </g>

  <!-- Connecting curves from left icons to center node -->
  <!-- Top curve: from cloud to center -->
  <path d="M120 90 C180 90, 200 160, 240 175" stroke="#444" stroke-width="2" fill="none"/>
  <!-- Middle line: from folder to center -->
  <line x1="120" y1="195" x2="240" y2="195" stroke="#555" stroke-width="2"/>
  <!-- Bottom curve: from lock to center -->
  <path d="M120 300 C180 300, 200 220, 240 210" stroke="#444" stroke-width="2" fill="none"/>

  <!-- Center node: Sycord processing -->
  <rect x="240" y="145" width="100" height="100" rx="24" fill="#232326"/>
  <g transform="translate(265, 168)">
    <!-- Mountain/landscape icon representing Sycord -->
    <path d="M0 50L18 15L30 32L50 0L50 50Z" fill="#555"/>
    <path d="M0 50L18 15L30 32L50 0" stroke="#666" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Connecting line from center to right -->
  <line x1="340" y1="195" x2="410" y2="195" stroke="#555" stroke-width="2"/>

  <!-- Right: Globe/online container -->
  <rect x="410" y="95" width="150" height="200" rx="28" fill="#1a1a1d"/>
  <rect x="410" y="95" width="150" height="200" rx="28" stroke="#2a2a2d" stroke-width="1"/>

  <!-- Globe icon -->
  <g transform="translate(450, 150)">
    <circle cx="35" cy="35" r="30" stroke="#555" stroke-width="2" fill="none"/>
    <ellipse cx="35" cy="35" rx="14" ry="30" stroke="#555" stroke-width="1.5" fill="none"/>
    <line x1="5" y1="35" x2="65" y2="35" stroke="#555" stroke-width="1.5"/>
    <path d="M10 20 Q35 16 60 20" stroke="#444" stroke-width="1" fill="none"/>
    <path d="M10 50 Q35 54 60 50" stroke="#444" stroke-width="1" fill="none"/>
    <!-- Green online dot -->
    <circle cx="58" cy="12" r="5" fill="#22c55e"/>
    <circle cx="58" cy="12" r="8" fill="#22c55e" opacity="0.2"/>
  </g>
</svg>
